<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fit Diary 2.0 🌸</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Fit Diary" />
  <meta name="theme-color" content="#F2A7B8" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rose:#F2A7B8;--rose-light:#FDE8EE;--rose-mid:#F7C5D0;
      --blush:#FDF0F3;--lilac:#E8D5F5;--lilac-mid:#C9A8E0;
      --sage:#D4EAD0;--sage-mid:#A8CFA3;
      --ink:#3D2C35;--ink-soft:#7A6570;
      --white:#FFFFFF;--border:#F0DDE4;
      --radius:14px;--radius-sm:8px;
      --shadow:0 2px 16px rgba(200,120,140,0.10);
      --shadow-sm:0 1px 6px rgba(200,120,140,0.08);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--blush);color:var(--ink);min-height:100vh;padding-bottom:max(80px,calc(60px + env(safe-area-inset-bottom)))}

    .app-header{background:var(--white);border-bottom:1px solid var(--border);padding:18px 20px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
    .app-header h1{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--ink);letter-spacing:-0.02em}

    .tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -2px 12px rgba(200,120,140,0.08);padding-bottom:calc(env(safe-area-inset-bottom) + 8px)}
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:12px 4px 10px;background:none;border:none;cursor:pointer;color:var(--ink-soft);font-family:'DM Sans',sans-serif;font-size:0.68rem;font-weight:500;transition:color 0.2s}
    .tab-btn .tab-icon{font-size:1.2rem}
    .tab-btn.active{color:var(--rose)}

    .view{display:none;padding:20px 16px}
    .view.active{display:block}
    .section-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--ink);margin-bottom:14px}

    /* ── CALENDAR ── */
    .calendar-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .calendar-nav button{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);width:34px;height:34px;cursor:pointer;font-size:1rem;color:var(--ink-soft);display:flex;align-items:center;justify-content:center}
    .calendar-nav .month-label{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--ink);text-transform:capitalize}

    .streak-bar{display:flex;gap:6px;margin-bottom:14px;padding:12px 14px;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-sm);align-items:center}
    .streak-item{display:flex;flex-direction:column;align-items:center;flex:1}
    .streak-num{font-size:1.2rem;font-weight:700;color:var(--rose);line-height:1}
    .streak-label{font-size:0.65rem;color:var(--ink-soft);margin-top:2px;text-align:center}
    .streak-divider{width:1px;height:28px;background:var(--border);flex-shrink:0}

    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .cal-weekday{text-align:center;font-size:0.6rem;font-weight:600;color:var(--ink-soft);padding:4px 0 6px;text-transform:uppercase;letter-spacing:0.04em}
    .cal-day{border-radius:10px;min-height:66px;padding:6px 4px 5px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;background:var(--white);border:1px solid var(--border);position:relative;overflow:hidden;transition:border-color 0.15s}
    .cal-day:hover{border-color:var(--rose-mid)}
    .cal-day.empty{background:none;border-color:transparent;cursor:default}
    .cal-day.today{border-color:var(--rose);border-width:1.5px}
    .cal-day.selected{border-color:#D4708A;border-width:2px}
    .cal-day.rest{background:var(--sage);border-color:var(--sage-mid)}
    .cal-day-bg{position:absolute;inset:0;z-index:0}
    .cal-day-num{font-size:0.75rem;font-weight:500;color:var(--ink);z-index:1;line-height:1}
    .cal-day.today .cal-day-num{color:var(--rose);font-weight:700}
    .cal-day-emojis{display:flex;gap:1px;z-index:1;flex-wrap:wrap;justify-content:center}
    .cal-day-emoji{font-size:0.85rem;line-height:1}
    .cal-day-rest-icon{font-size:0.9rem;z-index:1;opacity:0.45;margin-top:4px}
    .cal-done-ring{position:absolute;bottom:3px;right:3px;width:13px;height:13px;border-radius:50%;background:var(--sage-mid);display:flex;align-items:center;justify-content:center;z-index:2;font-size:0.5rem;color:#2A5A26;font-weight:700}

    /* ── DAY PANEL ── */
    .day-panel{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-top:14px}
    .day-panel h3{font-family:'DM Serif Display',serif;font-size:1rem;margin-bottom:14px;color:var(--ink);text-transform:capitalize}
    .day-type-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .day-type-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:500;cursor:pointer;color:var(--ink-soft);transition:all 0.15s}
    .day-type-btn.active-rest{background:var(--sage);border-color:var(--sage-mid);color:var(--ink)}
    .day-type-btn.clear{color:var(--ink-soft)}

    /* MULTI-CATEGORY SELECTOR */
    .cat-selector-label{font-size:0.75rem;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;display:block}
    .cat-chips-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
    .cat-chip{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:500;cursor:pointer;color:var(--ink-soft);transition:all 0.15s}
    .cat-chip.selected{color:var(--white);border-color:transparent}

    .field-label{font-size:0.75rem;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;display:block}
    select,input[type="text"],input[type="number"]{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--ink);background:var(--white);outline:none;transition:border-color 0.15s;appearance:none}
    select:focus,input:focus{border-color:var(--rose)}

    /* RANDOM BTN */
    .random-btn{width:100%;padding:11px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--rose),var(--lilac-mid));color:var(--white);font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.15s}
    .random-btn:hover{opacity:0.9}

    .exercise-planner{margin-top:4px}
    .exercise-planner h4{font-size:0.8rem;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
    .exercise-row{background:var(--blush);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
    .exercise-row-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .exercise-row-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0}
    .exercise-row-info{flex:1;min-width:0}
    .exercise-row-name{font-weight:500;font-size:0.88rem;margin-bottom:2px}
    .exercise-row-cat{font-size:0.72rem;color:var(--ink-soft)}
    .exercise-row-links{display:flex;gap:8px;margin-top:3px}
    .ex-link{font-size:0.72rem;color:var(--rose);text-decoration:none;font-weight:500}
    .exercise-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
    .mini-input-wrap{display:flex;flex-direction:column;gap:3px}
    .mini-label{font-size:0.65rem;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.05em}
    .mini-input{padding:6px 8px!important;font-size:0.82rem!important}
    .btn-remove-ex{background:none;border:none;cursor:pointer;color:var(--rose);font-size:1rem;padding:2px;margin-left:auto;align-self:flex-start}
    .add-exercise-row{display:flex;gap:8px;margin-top:8px}
    .add-exercise-row select{flex:1}

    .finish-section{margin-top:18px;background:var(--rose-light);border-radius:var(--radius);padding:16px}
    .finish-section h4{font-family:'DM Serif Display',serif;font-size:0.95rem;margin-bottom:12px;color:var(--ink)}
    .finish-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .completed-badge{display:inline-flex;align-items:center;gap:5px;background:var(--sage);color:var(--ink);font-size:0.75rem;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:10px}
    .stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.85rem}
    .stat-row:last-child{border-bottom:none}
    .stat-val{font-weight:600;color:var(--rose)}

    .btn{padding:10px 18px;border-radius:20px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;transition:all 0.15s}
    .btn-primary{background:var(--rose);color:var(--white)}
    .btn-secondary{background:var(--white);color:var(--rose);border:1.5px solid var(--rose)}
    .btn-sm{padding:7px 14px;font-size:0.78rem}
    .btn-full{width:100%}
    .btn-success{background:var(--sage-mid);color:var(--white)}

    /* ── EXERCISES TAB ── */
    .ex-search-bar{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:20px}
    .ex-search-bar input{border:none;background:none;font-size:0.88rem;color:var(--ink);outline:none;width:100%;padding:0}
    .cat-section{margin-bottom:24px}
    .cat-section-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;border-bottom:2px solid var(--rose);margin-bottom:2px}
    .cat-section-left{display:flex;align-items:center;gap:8px}
    .cat-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .cat-section-name{font-size:0.95rem;font-weight:600;color:var(--ink)}
    .cat-section-count{font-size:0.75rem;color:var(--ink-soft);margin-left:2px}
    .cat-section-actions{display:flex;gap:2px}
    .cat-icon-btn{background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:0.9rem;padding:5px 7px;border-radius:var(--radius-sm);line-height:1}
    .cat-icon-btn:hover{background:var(--rose-light);color:var(--rose)}
    .cat-edit-bar{display:none;background:var(--rose-light);border-radius:var(--radius-sm);padding:10px 12px;margin-top:8px;gap:8px;align-items:center;flex-wrap:wrap}
    .cat-edit-bar.open{display:flex}
    .cat-edit-bar input[type="text"]{flex:1;min-width:120px;font-size:0.85rem;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--white);color:var(--ink);outline:none}
    .cat-edit-emoji-row{display:flex;gap:5px;flex-wrap:wrap}
    .cat-edit-emoji{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--white);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .cat-edit-emoji.selected{border-color:var(--rose);background:var(--rose-light)}
    .cat-edit-actions{display:flex;gap:6px}
    .btn-save-sm{background:var(--rose);border:none;border-radius:var(--radius-sm);color:var(--white);font-size:0.78rem;font-weight:600;padding:6px 14px;cursor:pointer;font-family:'DM Sans',sans-serif}
    .btn-cancel-sm{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--ink-soft);font-size:0.78rem;font-weight:600;padding:6px 12px;cursor:pointer;font-family:'DM Sans',sans-serif}

    .ex-item{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);gap:10px}
    .ex-item:last-of-type{border-bottom:none}
    .ex-item-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .ex-item-thumb{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0}
    .ex-item-info{flex:1;min-width:0}
    .ex-item-name{font-size:0.88rem;color:var(--ink);font-weight:500}
    .ex-item-sub{font-size:0.72rem;color:var(--ink-soft);margin-top:2px}
    .ex-item-actions{display:flex;gap:2px;flex-shrink:0}
    .ex-detail-form{background:var(--rose-light);border-radius:var(--radius-sm);padding:12px;margin:4px 0 8px;display:none}
    .ex-detail-form.open{display:block}
    .ex-detail-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
    .ex-detail-row.full{grid-template-columns:1fr}
    .advanced-toggle{width:100%;background:none;border:1px dashed var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--ink-soft);font-family:'DM Sans',sans-serif;font-size:0.78rem;cursor:pointer;margin:6px 0 4px;display:flex;align-items:center;justify-content:space-between}
    .advanced-toggle:hover{background:var(--white)}
    .advanced-fields{display:none;padding-top:8px}
    .advanced-fields.open{display:block}

    /* WEIGHT TRACKER on finish */
    .weight-chip{display:inline-flex;align-items:center;gap:6px;background:var(--white);border-radius:20px;padding:4px 10px;font-size:0.75rem;color:var(--ink-soft);margin-top:4px}
    .calorie-badge{display:inline-flex;align-items:center;gap:5px;background:#FFF3E0;color:#B5651D;font-size:0.75rem;font-weight:600;padding:4px 10px;border-radius:20px;margin-left:6px}
    .fatigue-badge{display:inline-flex;align-items:center;gap:5px;font-size:0.75rem;font-weight:600;padding:4px 10px;border-radius:20px;margin-left:6px}
    .fatigue-low{background:var(--sage);color:#2A5A26}
    .fatigue-mid{background:#FFF3E0;color:#B5651D}
    .fatigue-high{background:#FCE4E4;color:#B5302E}
    .add-ex-inline{display:flex;gap:8px;padding:10px 0 4px;align-items:center}
    .add-ex-inline input{flex:1;font-size:0.82rem;padding:7px 10px;border-radius:var(--radius-sm);border:1px dashed var(--border);background:var(--blush);color:var(--ink);outline:none}
    .add-ex-inline input:focus{border-color:var(--rose);border-style:solid}
    .add-ex-inline button{background:var(--rose);border:none;border-radius:var(--radius-sm);color:var(--white);font-size:0.78rem;font-weight:600;padding:7px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
    .btn-add-cat{width:100%;background:none;border:1.5px dashed var(--border);border-radius:var(--radius);padding:13px;color:var(--ink-soft);font-size:0.85rem;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:4px}
    .btn-add-cat:hover{background:var(--rose-light);border-color:var(--rose);color:var(--rose)}
    .seed-banner{background:linear-gradient(135deg,var(--rose-light),var(--lilac));border-radius:var(--radius);padding:16px;margin-bottom:18px;text-align:center}
    .seed-banner h4{font-family:'DM Serif Display',serif;font-size:1rem;margin-bottom:6px;color:var(--ink)}
    .seed-banner p{font-size:0.8rem;color:var(--ink-soft);margin-bottom:12px;line-height:1.4}
    .seed-banner button{background:var(--ink);color:var(--white);border:none;border-radius:20px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer}
    .seed-banner button:hover{opacity:0.85}
    .seed-banner-dismiss{background:none!important;color:var(--ink-soft)!important;text-decoration:underline;font-size:0.75rem!important;padding:6px!important;margin-top:6px}
    .ex-empty{font-size:0.82rem;color:var(--ink-soft);padding:10px 0 4px;font-style:italic}
    .add-form{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:16px;margin-bottom:16px}
    .add-form h3{font-family:'DM Serif Display',serif;font-size:1rem;margin-bottom:14px}
    .form-row{margin-bottom:12px}
    .emoji-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
    .emoji-opt{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:var(--blush);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .emoji-opt.selected{border-color:var(--rose);background:var(--rose-light)}
    .color-row{display:flex;gap:8px;margin-bottom:12px}
    .color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s}
    .color-opt.selected{border-color:var(--ink);transform:scale(1.15)}

    /* ── HOY (Today tab) ── */
    .today-header-card{background:linear-gradient(135deg,var(--rose-light),var(--lilac));border-radius:var(--radius);padding:18px;margin-bottom:18px}
    .today-header-card h3{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--ink);margin-bottom:4px;text-transform:capitalize}
    .today-header-sub{font-size:0.78rem;color:var(--ink-soft);margin-bottom:6px}
    .today-objective{font-size:0.85rem;color:var(--ink);margin-bottom:14px}
    .today-header-count{font-size:0.75rem;color:var(--ink-soft);margin-top:10px;text-align:center}
    .today-stats-row{display:flex;gap:8px}
    .today-stat{flex:1;background:rgba(255,255,255,0.6);border-radius:var(--radius-sm);padding:10px;text-align:center}
    .today-stat-val{font-size:1.1rem;font-weight:700;color:var(--ink);line-height:1.1}
    .today-stat-label{font-size:0.62rem;color:var(--ink-soft);margin-top:3px;text-transform:uppercase;letter-spacing:0.04em}

    .today-progress{display:flex;align-items:center;gap:10px;margin-bottom:16px;background:var(--white);border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow-sm)}
    .today-progress-bar{flex:1;height:8px;background:var(--rose-light);border-radius:10px;overflow:hidden}
    .today-progress-fill{height:100%;background:var(--sage-mid);border-radius:10px;transition:width 0.3s}
    .today-progress-text{font-size:0.78rem;font-weight:600;color:var(--ink-soft);white-space:nowrap}

    .today-ex-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-sm);margin-bottom:10px;overflow:hidden;transition:opacity 0.2s}
    .today-ex-card.done{opacity:0.55}
    .today-ex-top{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer}
    .today-ex-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--rose);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--white);font-size:0.8rem;color:transparent;transition:all 0.15s}
    .today-ex-check.checked{background:var(--sage-mid);border-color:var(--sage-mid);color:var(--white)}
    .today-ex-num{font-size:0.7rem;font-weight:700;color:var(--ink-soft);width:18px;flex-shrink:0}
    .today-ex-info{flex:1;min-width:0}
    .today-ex-name{font-size:0.92rem;font-weight:600;color:var(--ink)}
    .today-ex-name.strike{text-decoration:line-through;color:var(--ink-soft)}
    .today-ex-meta{display:flex;gap:8px;align-items:center;margin-top:3px;flex-wrap:wrap}
    .today-ex-srtag{font-size:0.78rem;color:var(--ink-soft);font-weight:500}
    .today-ex-muscletag{font-size:0.68rem;color:var(--ink-soft);background:var(--blush);padding:2px 8px;border-radius:10px}
    .today-ex-fatiguetag{font-size:0.68rem;font-weight:600;padding:2px 8px;border-radius:10px}
    .today-ex-arrow{color:var(--ink-soft);font-size:0.8rem;transition:transform 0.2s;flex-shrink:0}
    .today-ex-arrow.open{transform:rotate(180deg)}

    .today-ex-detail{display:none;padding:0 14px 16px;border-top:1px solid var(--border)}
    .today-ex-detail.open{display:block}
    .today-ex-detail-section{margin-top:12px}
    .today-ex-detail-label{font-size:0.68rem;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
    .today-ex-detail-text{font-size:0.85rem;color:var(--ink);line-height:1.4}
    .today-ex-muscle-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
    .today-ex-muscle-pill{font-size:0.72rem;background:var(--blush);color:var(--ink-soft);padding:3px 10px;border-radius:20px}
    .today-ex-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    .today-ex-detail-box{background:var(--blush);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
    .today-ex-detail-box-val{font-size:1rem;font-weight:700;color:var(--rose)}

  // ── Fase 1: listas de referencia (todo opcional) ──────────
  const MUSCLE_GROUPS = ['Pecho','Espalda','Hombros','Bíceps','Tríceps','Cuádriceps','Isquiotibiales','Glúteos','Gemelos','Core','Abdomen','Oblicuos','Full Body'];
  const MOVEMENT_PATTERNS = ['Squat','Hinge','Push Horizontal','Push Vertical','Pull Horizontal','Pull Vertical','Core','Locomotion','Full Body'];
  const TRAINING_TYPES = ['Fuerza','Hipertrofia','Resistencia','HIIT','Circuito','Movilidad'];
  const DIFFICULTIES = ['Principiante','Intermedio','Avanzado'];

  onValue(ref(db,'fitdiary2/categories'), snap => { categories = snap.val()||{}; renderCategoriesList(); renderToday(); });
  onValue(ref(db,'fitdiary2/exercises'), snap => { exercises = snap.val()||{}; renderCategoriesList(); renderToday(); });
  onValue(ref(db,'fitdiary2/workouts'), snap => {
    workouts = snap.val()||{};
    renderCalendar();
    if (selectedDay) renderDayPanel(selectedDay);
    renderStats();
    renderToday();
  });
  let bodyWeightLog = {};
  onValue(ref(db,'fitdiary2/bodyWeightLog'), snap => { bodyWeightLog = snap.val()||{}; renderStats(); });

  window.switchTab = function(name, btn) {
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('view-'+name).classList.add('active');
    btn.classList.add('active');
    if (name==='stats') renderStats();
    if (name==='today') renderToday();
  };

  // ── CALENDAR ──────────────────────────────────────────────
  function renderCalendar() {
    const label = document.getElementById('month-label');
    const grid = document.getElementById('calendar-grid');
    const d = new Date(currentYear, currentMonth, 1);
    label.textContent = d.toLocaleDateString('es-ES',{month:'long',year:'numeric'});

    const allW = Object.entries(workouts);
    const monthWorkouts = allW.filter(([k,w])=>{
      const [y,m]=k.split('-');
      return +y===currentYear && +m-1===currentMonth && w.type==='workout';
    });
    const totalMins = monthWorkouts.filter(([,w])=>w.completed).reduce((a,[,w])=>a+(+w.duration||0),0);
    document.getElementById('streak-total').textContent = monthWorkouts.length;
    document.getElementById('streak-mins').textContent = totalMins;

    let streak = 0;
    const today = new Date();
    for (let i=0;i<365;i++) {
      const d2=new Date(today); d2.setDate(today.getDate()-i);
      const k=dateKey(d2.getFullYear(),d2.getMonth(),d2.getDate());
      if (workouts[k]?.type==='workout') streak++;
      else if (i>0) break;
    }
    document.getElementById('streak-days').textContent = streak+' 🔥';

    const weekdays=['L','M','X','J','V','S','D'];
    let html = weekdays.map(w=>`<div class="cal-weekday">${w}</div>`).join('');
    let startDay=(d.getDay()+6)%7;
    for(let i=0;i<startDay;i++) html+=`<div class="cal-day empty"></div>`;
    const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();

    for(let day=1;day<=daysInMonth;day++) {
      const dateStr=dateKey(currentYear,currentMonth,day);
      const w=workouts[dateStr];
      const isToday=today.getFullYear()===currentYear&&today.getMonth()===currentMonth&&today.getDate()===day;
      const isSelected=selectedDay===dateStr;

      let cls='cal-day';
      if(isToday) cls+=' today';
      if(isSelected) cls+=' selected';

      let inner=`<div class="cal-day-num">${day}</div>`;

      if(w?.type==='workout') {
        const catIds = w.categoryIds || (w.categoryId ? [w.categoryId] : []);
        const cats = catIds.map(id=>categories[id]).filter(Boolean);

        if(cats.length===0) {
          inner+=`<div class="cal-day-emojis"><span class="cal-day-emoji">🏋️</span></div>`;
        } else if(cats.length===1) {
          const color=cats[0].color||'#F2A7B8';
          inner+=`<div class="cal-day-bg" style="background:${color};opacity:0.18"></div>`;
          inner+=`<div class="cal-day-emojis"><span class="cal-day-emoji">${cats[0].icon}</span></div>`;
        } else {
          // split background with multiple colors
          const pct = 100/cats.length;
          const gradStops = cats.map((c,i)=>`${c.color} ${i*pct}% ${(i+1)*pct}%`).join(', ');
          inner+=`<div class="cal-day-bg" style="background:linear-gradient(135deg,${gradStops});opacity:0.25"></div>`;
          inner+=`<div class="cal-day-emojis">${cats.map(c=>`<span class="cal-day-emoji">${c.icon}</span>`).join('')}</div>`;
        }
        if(w.completed) inner+=`<div class="cal-done-ring">✓</div>`;
      } else if(w?.type==='rest') {
        cls+=' rest';
        inner+=`<div class="cal-day-rest-icon">😴</div>`;
      }

      html+=`<div class="${cls}" onclick="selectDay('${dateStr}')">${inner}</div>`;
    }
    grid.innerHTML=html;
  }

  window.changeMonth = function(dir) {
    currentMonth+=dir;
    if(currentMonth>11){currentMonth=0;currentYear++;}
    if(currentMonth<0){currentMonth=11;currentYear--;}
    renderCalendar();
  };

  window.selectDay = function(dateStr) {
    selectedDay=dateStr;
    renderCalendar();
    renderDayPanel(dateStr);
  };

  function renderDayPanel(dateStr) {
    const panel=document.getElementById('day-panel');
    panel.style.display='block';
    const w=workouts[dateStr]||{};
    const [y,m,dd]=dateStr.split('-');
    const dateObj=new Date(+y,+m-1,+dd);
    const dateLabel=dateObj.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
    const isWorkout=w.type==='workout';
    const isRest=w.type==='rest';

    // selected category ids (support multi)
    const selectedCatIds = w.categoryIds || (w.categoryId ? [w.categoryId] : []);

    // category chips
    const catChips = Object.entries(categories).map(([id,c])=>{
      const sel = selectedCatIds.includes(id);
      const style = sel ? `background:${c.color};border-color:${c.color}` : '';
      return `<button class="cat-chip ${sel?'selected':''}" style="${style}" onclick="toggleDayCat('${dateStr}','${id}')">${c.icon} ${c.name}</button>`;
    }).join('');

    // exercises filtered by selected categories
    const filteredExercises = Object.entries(exercises).filter(([,e])=>
      selectedCatIds.length===0 || selectedCatIds.includes(e.categoryId)
    );
    const exSelectOpts = filteredExercises.map(([id,e])=>{
      const cat=categories[e.categoryId];
      return `<option value="${id}">${cat?cat.icon+' ':''}${e.name}</option>`;
    }).join('');

    const planExercises=w.exercises||[];
    let exRows=planExercises.map((pe,idx)=>{
      const ex=exercises[pe.exerciseId]; if(!ex) return '';
      const cat=categories[ex.categoryId];
      const defaultSets=pe.sets!==undefined?pe.sets:(ex.sets||'');
      const defaultReps=pe.reps!==undefined?pe.reps:(ex.reps||'');
      const thumbHtml=ex.photoUrl?`<img class="exercise-row-thumb" src="${ex.photoUrl}" onerror="this.style.display='none'" />`:'';
      const videoLink=ex.videoUrl?`<a class="ex-link" href="${ex.videoUrl}" target="_blank">▶ Ver vídeo</a>`:'';
      return `
        <div class="exercise-row">
          <div class="exercise-row-top">
            ${thumbHtml}
            <div class="exercise-row-info">
              <div class="exercise-row-name">${ex.name}</div>
              <div class="exercise-row-cat">${cat?cat.icon+' '+cat.name:''}</div>
              <div class="exercise-row-links">${videoLink}</div>
            </div>
            <button class="btn-remove-ex" onclick="removeExFromDay(${idx})">✕</button>
          </div>
          <div class="exercise-inputs">
            <div class="mini-input-wrap"><span class="mini-label">Series</span><input type="number" class="mini-input" min="0" value="${defaultSets}" placeholder="${ex.sets||'0'}" oninput="updateExField(${idx},'sets',this.value)" /></div>
            <div class="mini-input-wrap"><span class="mini-label">Reps</span><input type="number" class="mini-input" min="0" value="${defaultReps}" placeholder="${ex.reps||'0'}" oninput="updateExField(${idx},'reps',this.value)" /></div>
            <div class="mini-input-wrap"><span class="mini-label">Peso (kg)</span><input type="number" class="mini-input" min="0" step="0.5" value="${pe.weight||''}" placeholder="—" oninput="updateExField(${idx},'weight',this.value)" /></div>
          </div>
        </div>`;
    }).join('');

    const sessionMet = calcSessionMET(planExercises);
    const sessionFatigue = calcSessionFatigue(planExercises);
    const fatigueClass = sessionFatigue<=8?'fatigue-low':sessionFatigue<=15?'fatigue-mid':'fatigue-high';

    const completedBlock=w.completed?`
      <div class="completed-badge">✅ Entrenamiento completado</div>
      <div class="stat-row"><span>Duración</span><span class="stat-val">${w.duration||'—'} min</span></div>
      <div class="stat-row"><span>Peso total levantado</span><span class="stat-val">${w.totalWeight||'—'} kg</span></div>
      ${w.bodyWeight?`<div class="stat-row"><span>Tu peso ese día</span><span class="stat-val">${w.bodyWeight} kg</span></div>`:''}

  // ── Fase 1: cálculo de MET / calorías / fatiga ────────────
  function calcSessionMET(planExercises) {
    if (!planExercises || !planExercises.length) return null;
    const mets = planExercises.map(pe => {
      const ex = exercises[pe.exerciseId];
      return ex && ex.met ? parseFloat(ex.met) : null;
    }).filter(v => v !== null && !isNaN(v));
    if (!mets.length) return null;
    const avg = mets.reduce((a,b)=>a+b,0) / mets.length;
    return Math.round(avg*10)/10;
  }

  function calcSessionFatigue(planExercises) {
    if (!planExercises || !planExercises.length) return 0;
    return planExercises.reduce((sum, pe) => {
      const ex = exercises[pe.exerciseId];
      const f = ex && ex.fatigueScore ? parseFloat(ex.fatigueScore) : 0;
      return sum + (isNaN(f) ? 0 : f);
    }, 0);
  }

  function calcCalories(met, bodyWeightKg, durationMin) {
    if (!met || !bodyWeightKg || !durationMin) return null;
    const perMinute = (met * bodyWeightKg * 3.5) / 200;
    return Math.round(perMinute * durationMin);
  }

  window.finishWorkout = function(dateStr) {
    const duration=document.getElementById('finish-duration')?.value||'';
    const totalWeight=document.getElementById('finish-weight')?.value||'';
    const bodyWeight=document.getElementById('finish-bodyweight')?.value||'';
    const w = workouts[dateStr]||{};
    const planExercises = w.exercises||[];

    const sessionMet = calcSessionMET(planExercises);
    const totalFatigue = calcSessionFatigue(planExercises);
    const estimatedCalories = bodyWeight && sessionMet && duration
      ? calcCalories(sessionMet, parseFloat(bodyWeight), parseFloat(duration))
      : null;

    set(ref(db,`fitdiary2/workouts/${dateStr}`),{
      ...w, completed:true, duration, totalWeight,
      bodyWeight: bodyWeight||'',
      estimatedCalories: estimatedCalories||'',
      totalFatigue: totalFatigue||''
    });

    // also log body weight to a separate history for tracking evolution
    if (bodyWeight) {
      set(ref(db,`fitdiary2/bodyWeightLog/${dateStr}`), {weight: parseFloat(bodyWeight)});
    }

    showToast('¡Entrenamiento completado! 🎉');
  };

  // ── RANDOMIZER ────────────────────────────────────────────
  window.randomizeWorkout = function(dateStr) {
    const w=workouts[dateStr]||{};
    const catIds=w.categoryIds||(w.categoryId?[w.categoryId]:[]);
    if(!catIds.length) return showToast('Elige al menos una categoría');

    // Get recently used exercises (last 3 days)
    const recentExIds=new Set();
    for(let i=1;i<=3;i++) {
      const d=new Date(); d.setDate(d.getDate()-i);
      const k=dateKey(d.getFullYear(),d.getMonth(),d.getDate());
      (workouts[k]?.exercises||[]).forEach(pe=>recentExIds.add(pe.exerciseId));
    }

    // Pick exercises per category, 4 total split evenly
    const perCat=Math.ceil(4/catIds.length);
    let picked=[];

    catIds.forEach(catId=>{
      const pool=Object.entries(exercises).filter(([,e])=>e.categoryId===catId);
      // prefer not recently used
      const fresh=pool.filter(([id])=>!recentExIds.has(id));
      const source=fresh.length>=perCat?fresh:pool; // fallback to all if not enough fresh
      const shuffled=[...source].sort(()=>Math.random()-0.5);
      shuffled.slice(0,perCat).forEach(([id,ex])=>{
        picked.push({exerciseId:id,sets:ex.sets||'3',reps:ex.reps||'12',weight:''});
      });
    });

    // cap to 4
    picked=picked.slice(0,4);
    set(ref(db,`fitdiary2/workouts/${dateStr}`),{...w,exercises:picked});
    showToast('✨ Entrenamiento generado!');
  };

            </div>
            <div class="cat-section-actions">
              <button class="cat-icon-btn" onclick="toggleEditCat('${catId}')">✏️</button>
              <button class="cat-icon-btn" onclick="deleteCategory('${catId}')">🗑️</button>
            </div>
          </div>
          <div class="cat-edit-bar" id="editbar-${catId}">
            <input type="text" id="edit-cat-name-${catId}" value="${cat.name}" placeholder="Nombre" />
            <div class="cat-edit-emoji-row" id="edit-emoji-row-${catId}"></div>
            <div class="cat-edit-actions">
              <button class="btn-cancel-sm" onclick="toggleEditCat('${catId}')">Cancelar</button>
              <button class="btn-save-sm" onclick="saveCat('${catId}')">Guardar</button>
            </div>
          </div>
          ${exHtml}
          ${!query?`<div class="add-ex-inline">
            <input type="text" id="add-ex-input-${catId}" placeholder="Nuevo ejercicio…" onkeydown="if(event.key==='Enter')addExerciseInline('${catId}')" />
            <button onclick="addExerciseInline('${catId}')">Añadir</button>
          </div>`:''}
        </div>`;
    }).join('');
  }

  // ── STATS ─────────────────────────────────────────────────
  function renderStats(){
    const all=Object.entries(workouts);
    const completed=all.filter(([,w])=>w.completed);
    const totalWorkouts=all.filter(([,w])=>w.type==='workout').length;
    const totalDuration=completed.reduce((a,[,w])=>a+(+w.duration||0),0);
    const totalWeight=completed.reduce((a,[,w])=>a+(+w.totalWeight||0),0);
    const totalCalories=completed.reduce((a,[,w])=>a+(+w.estimatedCalories||0),0);
    const totalFatigue=completed.reduce((a,[,w])=>a+(+w.totalFatigue||0),0);

    document.getElementById('stats-summary').innerHTML=`
      <div class="stats-card">
        <h3>Resumen general</h3>
        <div class="stat-row"><span>Días de entrenamiento</span><span class="stat-val">${totalWorkouts}</span></div>
        <div class="stat-row"><span>Completados</span><span class="stat-val">${completed.length}</span></div>
        <div class="stat-row"><span>Tiempo total</span><span class="stat-val">${totalDuration} min</span></div>
        <div class="stat-row"><span>Peso total levantado</span><span class="stat-val">${totalWeight} kg</span></div>
        ${totalCalories?`<div class="stat-row"><span>Calorías estimadas</span><span class="stat-val">🔥 ${totalCalories} kcal</span></div>`:''}
        ${totalFatigue?`<div class="stat-row"><span>Fatiga acumulada</span><span class="stat-val">${totalFatigue}</span></div>`:''}
      </div>`;

    // Body weight evolution
    const weightEntries = Object.entries(bodyWeightLog).sort((a,b)=>a[0].localeCompare(b[0]));
    if (weightEntries.length) {
      const recent = weightEntries.slice(-8);
      const first = recent[0][1].weight;
      const last = recent[recent.length-1][1].weight;
      const diff = Math.round((last-first)*10)/10;
      const diffLabel = diff>0?`+${diff}`:diff;
      document.getElementById('weight-evolution').innerHTML = `
        <div class="stats-card">
          <h3>📈 Evolución de tu peso</h3>
          <div class="stat-row"><span>Último registrado</span><span class="stat-val">${last} kg</span></div>
          <div class="stat-row"><span>Cambio (últimos ${recent.length} registros)</span><span class="stat-val">${diffLabel} kg</span></div>
          ${recent.map(([d,v])=>{
            const [y,m,dd]=d.split('-');
            const label=new Date(+y,+m-1,+dd).toLocaleDateString('es-ES',{day:'numeric',month:'short'});
            return `<div class="stat-row" style="font-size:0.78rem"><span>${label}</span><span>${v.weight} kg</span></div>`;
          }).join('')}
        </div>`;
    } else {
      document.getElementById('weight-evolution').innerHTML = '';
    }

    const freq={};
    all.forEach(([,w])=>(w.exercises||[]).forEach(pe=>{if(pe.exerciseId) freq[pe.exerciseId]=(freq[pe.exerciseId]||0)+1;}));
    const freqEntries=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
    const maxFreq=freqEntries[0]?.[1]||1;

    if(freqEntries.length){
      const bottom=[...freqEntries].sort((a,b)=>a[1]-b[1]).slice(0,3);
      const bottomIds=new Set(bottom.map(([id])=>id));
      const barsHtml=freqEntries.slice(0,8).map(([exId,count])=>{
        const ex=exercises[exId]; if(!ex) return '';
        const pct=Math.round((count/maxFreq)*100);
        const isHot=freqEntries[0]?.[0]===exId||freqEntries[1]?.[0]===exId;
        const isCold=bottomIds.has(exId)&&freqEntries.length>3;
        return `<div class="analysis-bar-wrap">
          <div class="analysis-bar-label">
            <span>${ex.name}${isHot?'<span class="analysis-badge badge-hot">🔥 más usado</span>':''}${isCold?'<span class="analysis-badge badge-cold">💤 poco usado</span>':''}</span>
            <span>${count} vez${count!==1?'es':''}</span>
          </div>
          <div class="analysis-bar-track"><div class="analysis-bar-fill ${isCold?'low':''}" style="width:${pct}%"></div></div>
        </div>`;
      }).join('');
      document.getElementById('exercise-analysis').innerHTML=`
        <div class="stats-card"><h3>Análisis de ejercicios</h3>${barsHtml}
          ${freqEntries.length>3?`<p style="font-size:0.8rem;color:var(--ink-soft);margin-top:12px">💡 <b>${exercises[bottom[0][0]]?.name||''}</b> podría ser un buen candidato para usar más en tu rutina.</p>`:''}
        </div>`;
    } else { document.getElementById('exercise-analysis').innerHTML=''; }

    if(!completed.length){
      document.getElementById('workout-log').innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><p>Aún no tienes entrenamientos completados</p></div>`;
      return;
    }
    document.getElementById('workout-log').innerHTML=`
      <p class="section-title" style="margin-top:8px">Últimos entrenamientos</p>
      ${completed.sort((a,b)=>b[0].localeCompare(a[0])).map(([dateStr,w])=>{
        const [y,m,d]=dateStr.split('-');
        const dateLabel=new Date(+y,+m-1,+d).toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
        const catIds=w.categoryIds||(w.categoryId?[w.categoryId]:[]);
        const catNames=catIds.map(id=>categories[id]).filter(Boolean).map(c=>c.icon+' '+c.name).join(' + ');
        const exCount=(w.exercises||[]).length;
        return `<div class="workout-log-item">
          <div class="workout-log-date">${catNames||''} ${dateLabel}</div>
          <div class="workout-log-meta">
            ${w.duration?`<span>⏱ ${w.duration} min</span>`:''}
            ${w.totalWeight?`<span>🏋️ ${w.totalWeight} kg</span>`:''}
            ${exCount?`<span>📝 ${exCount} ejercicio${exCount!==1?'s':''}</span>`:''}
          </div>
        </div>`;
      }).join('')}`;
  }

  function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
  function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
  window.renderCalendar=renderCalendar;
  renderCalendar();
  renderToday();

  // ── PESTAÑA "HOY" ──────────────────────────────────────────
  let todayOpenExercise = null; // idx of expanded exercise accordion

  function getTodayKey() {
    const t = new Date();
    return dateKey(t.getFullYear(), t.getMonth(), t.getDate());
  }

  // Tarjeta cuando todos los ejercicios están marcados pero aún no se ha guardado la sesión
  function renderFinishCelebration(planExercises, todayKey) {
    const sessionFatigue = calcSessionFatigue(planExercises);
    const sessionMet = calcSessionMET(planExercises);
    return `
      <div class="today-completed-banner">
        <h4>🎉 ¡Has terminado todos los ejercicios!</h4>
        <p style="font-size:0.8rem;color:#2A5A26;margin-top:4px">Guarda la sesión para registrarla en tu historial.</p>
      </div>
      <div class="today-finish-card">
        <h4 style="font-family:'DM Serif Display',serif;font-size:0.95rem;margin-bottom:12px">🏁 Guardar entrenamiento</h4>
        <div class="finish-row">
          <div><label class="field-label">Duración real (min)</label><input type="number" id="today-finish-duration" min="0" placeholder="${planExercises.length*4}" /></div>
          <div><label class="field-label">Peso total levantado (kg)</label><input type="number" id="today-finish-weight" min="0" step="0.5" placeholder="0" /></div>
        </div>
        <div class="form-row">
          <label class="field-label">Tu peso corporal hoy (kg) — opcional</label>
          <input type="number" id="today-finish-bodyweight" min="0" step="0.1" placeholder="Ej: 62.5" />
        </div>
        ${sessionMet?`<p style="font-size:0.78rem;color:var(--ink-soft);margin-bottom:10px">💡 MET medio de la sesión: ${sessionMet}. Si pones tu peso, calculamos las calorías.</p>`:''}
        <button class="btn btn-success btn-sm btn-full" onclick="saveTodaySession('${todayKey}')">Guardar sesión ✓</button>
      </div>`;
  }

  // Tarjeta cuando la sesión ya está guardada/completada
  function renderCompletedCelebration(w, todayKey) {
    return `
      <div class="today-completed-banner">
        <h4>🎉 Entrenamiento completado</h4>
        <div class="stat-row" style="border-bottom-color:rgba(0,0,0,0.08)"><span>Duración</span><span class="stat-val">${w.duration||'—'} min</span></div>
        ${w.totalWeight?`<div class="stat-row" style="border-bottom-color:rgba(0,0,0,0.08)"><span>Peso levantado</span><span class="stat-val">${w.totalWeight} kg</span></div>`:''}
        ${w.estimatedCalories?`<div class="stat-row" style="border-bottom-color:rgba(0,0,0,0.08)"><span>Calorías estimadas</span><span class="stat-val">🔥 ${w.estimatedCalories} kcal</span></div>`:''}
        ${w.totalFatigue?`<div class="stat-row"><span>Fatiga de la sesión</span><span class="stat-val">${w.totalFatigue}</span></div>`:''}
      </div>`;
  }

  window.saveTodaySession = function(dateStr) {
    const duration = document.getElementById('today-finish-duration')?.value || (workouts[dateStr]?.exercises?.length*4 || '');
    const totalWeight = document.getElementById('today-finish-weight')?.value || '';
    const bodyWeight = document.getElementById('today-finish-bodyweight')?.value || '';
    const w = workouts[dateStr] || {};
    const planExercises = w.exercises || [];

    const sessionMet = calcSessionMET(planExercises);
    const totalFatigue = calcSessionFatigue(planExercises);
    const estimatedCalories = bodyWeight && sessionMet && duration
      ? calcCalories(sessionMet, parseFloat(bodyWeight), parseFloat(duration))
      : null;

    set(ref(db, `fitdiary2/workouts/${dateStr}`), {
      ...w, completed: true, duration, totalWeight,
      bodyWeight: bodyWeight || '',
      estimatedCalories: estimatedCalories || '',
      totalFatigue: totalFatigue || ''
    });

    if (bodyWeight) {
      set(ref(db, `fitdiary2/bodyWeightLog/${dateStr}`), {weight: parseFloat(bodyWeight)});
    }

    showToast('🎉 ¡Sesión guardada!');
  };

  function renderToday() {
    const container = document.getElementById('today-content');
    if (!container) return;

    const todayKey = getTodayKey();
    const w = workouts[todayKey] || {};
    const t = new Date();
    const dateLabel = t.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});

    // Día de descanso
    if (w.type === 'rest') {
      container.innerHTML = `
        <div class="today-header-card">
          <h3>${dateLabel}</h3>
          <div class="today-header-sub">😴 Hoy es día de descanso. ¡Disfrútalo!</div>
        </div>`;
      return;
    }

    // No hay entrenamiento planificado
    if (w.type !== 'workout' || !(w.exercises||[]).length) {
      container.innerHTML = `
        <div class="today-header-card">
          <h3>${dateLabel}</h3>
          <div class="today-header-sub">Todavía no has planificado nada para hoy.</div>
        </div>
        <div class="empty-state">
          <div class="empty-icon">🗓️</div>
          <p>Ve a la pestaña Calendario para planificar tu entrenamiento de hoy${Object.keys(categories).length?' o genera uno aleatorio':''}.</p>
        </div>`;
      return;
    }

    const planExercises = w.exercises || [];
    const checkedSet = new Set(w.completedExerciseIdx || []);

    // Cabecera: objetivo del día, duración estimada, fatiga prevista, MET medio
    const estDuration = planExercises.length * 4; // ~4 min por ejercicio estimado
    const sessionFatigue = calcSessionFatigue(planExercises);
    const maxFatigue = planExercises.length * 5;
    const sessionMet = calcSessionMET(planExercises);

    const todayCatIds = w.categoryIds || (w.categoryId ? [w.categoryId] : []);
    const todayCats = todayCatIds.map(id => categories[id]).filter(Boolean);
    const objectiveLabel = todayCats.length
      ? todayCats.map(c => `${c.icon} ${c.name}`).join(' + ')
      : '';

    const doneCount = planExercises.filter((_,idx)=>checkedSet.has(idx)).length;
    const progressPct = planExercises.length ? Math.round((doneCount/planExercises.length)*100) : 0;
    const allDone = doneCount === planExercises.length && planExercises.length > 0;

    let html = `
      <div class="today-header-card">
        <h3>🏋️ Entrenamiento de hoy</h3>
        <div class="today-header-sub">${dateLabel}</div>
        ${objectiveLabel?`<div class="today-objective">Objetivo: <b>${objectiveLabel}</b></div>`:''}
        <div class="today-stats-row">
          <div class="today-stat"><div class="today-stat-val">~${estDuration} min</div><div class="today-stat-label">Duración est.</div></div>
          <div class="today-stat"><div class="today-stat-val">${sessionFatigue?`${sessionFatigue}/${maxFatigue}`:'—'}</div><div class="today-stat-label">Fatiga prevista</div></div>
          <div class="today-stat"><div class="today-stat-val">${sessionMet||'—'}</div><div class="today-stat-label">MET medio</div></div>
        </div>
        <div class="today-header-count">${planExercises.length} ejercicio${planExercises.length!==1?'s':''}</div>
      </div>`;

    if (w.completed) {
      html += renderCompletedCelebration(w, todayKey);
    } else if (allDone) {
      html += renderFinishCelebration(planExercises, todayKey);
    } else {
      html += `
        <div class="today-progress">
          <div class="today-progress-bar"><div class="today-progress-fill" style="width:${progressPct}%"></div></div>
          <div class="today-progress-text">${doneCount}/${planExercises.length}</div>
        </div>`;
    }

    html += planExercises.map((pe, idx) => {
      const ex = exercises[pe.exerciseId];
      if (!ex) return '';
      const cat = categories[ex.categoryId];
      const isChecked = checkedSet.has(idx);
      const isOpen = todayOpenExercise === idx;
      const srLabel = pe.reps ? `${pe.sets||ex.sets||'?'} × ${pe.reps}` : (ex.durationSeconds ? `${pe.sets||ex.sets||'3'} × ${ex.durationSeconds}s` : `${pe.sets||ex.sets||'?'} series`);
      const fatigueVal = ex.fatigueScore || 0;
      const fatigueClass = fatigueVal<=2?'fatigue-low':fatigueVal<=3?'fatigue-mid':'fatigue-high';

      const muscles = [ex.muscleGroup, ...(ex.secondaryMuscles||[])].filter(Boolean);
      const musclePills = muscles.length
        ? `<div class="today-ex-muscle-pills">${muscles.map(m=>`<span class="today-ex-muscle-pill">${m}</span>`).join('')}</div>`
        : `<p class="today-ex-detail-text" style="color:var(--ink-soft);font-style:italic">Sin grupo muscular definido</p>`;

      return `
        <div class="today-ex-card ${isChecked?'done':''}">
          <div class="today-ex-top" onclick="toggleTodayExercise(${idx})">
            <div class="today-ex-num">${idx+1}</div>
            <div class="today-ex-check ${isChecked?'checked':''}" onclick="event.stopPropagation();toggleExerciseDone('${todayKey}',${idx})">${isChecked?'✓':''}</div>
            <div class="today-ex-info">
              <div class="today-ex-name ${isChecked?'strike':''}">${ex.name}</div>
              <div class="today-ex-meta">
                <span class="today-ex-srtag">${srLabel}</span>
                ${cat?`<span class="today-ex-muscletag">${cat.icon} ${cat.name}</span>`:''}
                ${ex.fatigueScore?`<span class="today-ex-fatiguetag ${fatigueClass}">Fatiga ${ex.fatigueScore}</span>`:''}
              </div>
            </div>
            <div class="today-ex-arrow ${isOpen?'open':''}">▾</div>
          </div>
          <div class="today-ex-detail ${isOpen?'open':''}">
            ${ex.instructions?`
              <div class="today-ex-detail-section">
                <div class="today-ex-detail-label">Descripción</div>
                <div class="today-ex-detail-text">${ex.instructions}</div>
              </div>`:''}
            <div class="today-ex-detail-section">
              <div class="today-ex-detail-label">Músculos trabajados</div>
              ${musclePills}
            </div>
            ${ex.movementPattern||ex.met||ex.fatigueScore?`
            <div class="today-ex-detail-grid">
              ${ex.movementPattern?`<div class="today-ex-detail-box"><div class="today-ex-detail-box-val">${ex.movementPattern}</div><div class="today-ex-detail-box-label">Patrón</div></div>`:''}
              ${ex.met?`<div class="today-ex-detail-box"><div class="today-ex-detail-box-val">${ex.met}</div><div class="today-ex-detail-box-label">MET</div></div>`:''}
              ${ex.fatigueScore?`<div class="today-ex-detail-box"><div class="today-ex-detail-box-val">${ex.fatigueScore}/5</div><div class="today-ex-detail-box-label">Fatiga</div></div>`:''}
            </div>`:''}
            ${ex.commonMistakes?`
              <div class="today-ex-detail-section">
                <div class="today-ex-detail-label">Errores comunes</div>
                <div class="today-ex-detail-text">${ex.commonMistakes}</div>
              </div>`:''}
            ${ex.photoUrl?`<img class="today-ex-thumb" src="${ex.photoUrl}" onerror="this.style.display='none'" />`:''}
            ${ex.videoUrl?`<a class="today-ex-video" href="${ex.videoUrl}" target="_blank">▶ Ver vídeo</a>`:''}
          </div>
        </div>`;
    }).join('');

    container.innerHTML = html;
  }

  window.toggleTodayExercise = function(idx) {
    todayOpenExercise = (todayOpenExercise === idx) ? null : idx;
    renderToday();
  };

  window.toggleExerciseDone = function(dateStr, idx) {
    const w = workouts[dateStr] || {};
    let completedIdx = [...(w.completedExerciseIdx || [])];
    if (completedIdx.includes(idx)) completedIdx = completedIdx.filter(i => i !== idx);
    else completedIdx.push(idx);
    set(ref(db, `fitdiary2/workouts/${dateStr}`), {...w, completedExerciseIdx: completedIdx});
  };

</script>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('./service-worker.js').catch(e=>console.log('SW error',e));
    });
  }
</script>
</body>
</html>
